{% extends "base.html" %}
{% block title %}Reset password · ProSocial{% endblock %}
{% block content %}
  <h1>Reset password</h1>
  <p>Enter your email and we will send reset instructions.</p>

    {% csrf_token %}
    {% include "components/form_errors.html" %}
    {{ form.as_p }}
    <button type="submit">Send reset link</button>
  </form>
{% endblock %}
