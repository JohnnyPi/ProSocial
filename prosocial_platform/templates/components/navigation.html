<nav class="site-nav" aria-label="Main">
  <div class="container nav-inner">
    <a class="brand" href="{% url 'home' %}">ProSocial</a>
    <ul class="nav-links">
      {% if user.is_authenticated %}
        <li><a href="{% url 'dashboard:index' %}">Dashboard</a></li>
        <li><a href="{% url 'profiles:detail' handle=user.profile.handle %}">Profile</a></li>
        <li><a href="{% url 'profiles:edit' %}">Edit profile</a></li>
        <li>
          <form method="post" action="{% url 'accounts:logout' %}" class="inline-form">
            {% csrf_token %}
            <button type="submit" class="link-button">Log out</button>
          </form>
        </li>
      {% else %}
        <li><a href="{% url 'accounts:login' %}">Log in</a></li>
        <li><a href="{% url 'accounts:register' %}">Register</a></li>
      {% endif %}
    </ul>
  </div>
</nav>
