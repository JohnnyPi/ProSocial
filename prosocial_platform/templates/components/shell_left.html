<aside class="shell-left" aria-label="Primary">
  <a class="brand shell-brand" href="{% url 'home' %}">
    <svg class="brand-mark" width="32" height="32" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="18" fill="var(--ink-deep)"/>
      <circle cx="50" cy="44" r="20" fill="none" stroke="var(--surface-base)" stroke-width="3"/>
      <circle cx="50" cy="44" r="8" fill="var(--terracotta-base)"/>
      <rect x="30" y="72" width="40" height="4" rx="2" fill="var(--honey-base)"/>
    </svg>
    <span class="brand-name">Common Good</span>
  </a>

  <nav class="shell-nav" aria-label="Main">
    <ul class="shell-nav-list">
      <li>
        <a
          href="{% url 'dashboard:index' %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'dashboard' and request.resolver_match.url_name == 'index' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a
          href="{% url 'dashboard:knowledge' %}"
          class="shell-nav-link{% if request.resolver_match.url_name == 'knowledge' or request.resolver_match.namespace == 'knowledge' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span>Knowledge</span>
        </a>
      </li>
      <li>
        <a
          href="{% url 'guilds:list' %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'guilds' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Guilds</span>
        </a>
      </li>
      <li>
        <a
          href="{% url 'messaging:list' %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'messaging' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Messages</span>
          {% if shell_unread_messages %}
            <span class="shell-nav-badge">{{ shell_unread_messages }}</span>
          {% endif %}
        </a>
      </li>
      <li>
        <a
          href="{% url 'discovery:home' %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'discovery' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <span>Discover</span>
        </a>
      </li>
      <li>
        <a
          href="{% url 'prosocial_actions:action_list' %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'prosocial_actions' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.4-7 10-7 10Z"/>
          </svg>
          <span>Actions</span>
        </a>
      </li>
      <li>
        <a
          href="{% url 'interactions:notifications' %}"
          class="shell-nav-link{% if request.resolver_match.url_name == 'notifications' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>
          </svg>
          <span>Notifications</span>
          {% if shell_unread_notifications %}
            <span class="shell-nav-badge">{{ shell_unread_notifications }}</span>
          {% endif %}
        </a>
      </li>
      <li>
        <a
          href="{% url 'profiles:detail' handle=user.profile.handle %}"
          class="shell-nav-link{% if request.resolver_match.namespace == 'profiles' and request.resolver_match.url_name == 'detail' %} is-active{% endif %}"
        >
          <svg class="shell-nav-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Profile</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="shell-left-footer">
    <a href="{% url 'profiles:edit' %}" class="shell-nav-link shell-nav-link--subtle">Edit profile</a>
    <form method="post" action="{% url 'accounts:logout' %}" class="inline-form">
      {% csrf_token %}
      <button type="submit" class="link-button shell-logout">Log out</button>
    </form>
  </div>
</aside>
