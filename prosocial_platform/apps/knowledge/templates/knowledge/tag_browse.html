{% extends "base.html" %}
{% block title %}Tags · Common Good{% endblock %}
{% block content %}
<h1>Browse tags</h1>
<ul>
  {% for tag in tags %}
    <li><a href="{% url 'knowledge:tag_detail' slug=tag.slug %}">{{ tag.name }}</a></li>
  {% empty %}
    <li class="help-text">No tagged content yet.</li>
  {% endfor %}
</ul>
{% endblock %}
