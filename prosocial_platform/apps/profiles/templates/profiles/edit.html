{% extends "base.html" %}
{% block title %}Edit profile · Common Good{% endblock %}
{% block content %}
  <h1>Edit profile</h1>
  {% if saved %}
    <p class="flash flash-success" role="status">Profile saved.</p>
  {% endif %}
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    {% include "components/form_errors.html" %}
    {% for field in form %}
      <div class="field">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <button type="submit">Save profile</button>
  </form>
{% endblock %}
