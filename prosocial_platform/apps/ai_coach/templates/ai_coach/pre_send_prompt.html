{% if prompt %}
<div class="pre-send-prompt" role="status" aria-live="polite" data-civility-event-id="{{ event.id }}">
  <p><strong>Reflection prompt:</strong> {{ prompt }}</p>
  <div class="pre-send-prompt__actions">
    <button type="button" class="link-button" data-civility-action="EDITED">Edit</button>
    <button type="button" class="link-button" data-civility-action="POSTED_ANYWAY">Post anyway</button>
    <button type="button" class="link-button" data-civility-action="CANCELLED">Cancel</button>
  </div>
</div>
{% endif %}
