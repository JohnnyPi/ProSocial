<article class="action-card">
  <header class="post-card-header">
    <h2><a href="{% url 'prosocial_actions:action_detail' public_id=action.public_id %}">{{ action.post.get_kind_display }}</a></h2>
    <span class="chip chip--{{ action.post.kind|lower }}">{{ action.get_status_display }}</span>
  </header>
  <p class="reading-text">{{ action.post.body|truncatewords:30 }}</p>
  {% if action.location_label %}<p class="action-meta">{{ action.location_label }}</p>{% endif %}
</article>
