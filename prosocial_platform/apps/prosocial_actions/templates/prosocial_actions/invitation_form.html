{% extends "base.html" %}
{% block title %}Invite · Common Good{% endblock %}
{% block content %}
  <h1>Invite someone</h1>
  <form method="post">
    {% csrf_token %}
    {% include "components/form_errors.html" %}
    {% for field in form %}
      <div class="field">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <button type="submit">Send invitation</button>
  </form>
{% endblock %}
