{% extends "base.html" %}
{% block title %}Hidden posts · Common Good{% endblock %}
{% block content %}
  <h1>Hidden posts</h1>
  <ul>
    {% for hidden in hidden_posts %}
      <li>
        {{ hidden.post.body|truncatewords:20 }}
        <form method="post" class="inline-form">
          {% csrf_token %}
          <input type="hidden" name="post_id" value="{{ hidden.post.pk }}">
          <button type="submit">Restore</button>
        </form>
      </li>
    {% empty %}
      <li>No hidden posts.</li>
    {% endfor %}
  </ul>
{% endblock %}
