{% extends "base.html" %}
{% block title %}Submit appeal · Common Good{% endblock %}
{% block content %}
  <h1>Appeal moderation action</h1>
  <p><strong>Rule:</strong> {{ action.rule_code }}</p>
  <p>{{ action.explanation }}</p>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label for="statement">Why should this be reviewed?</label>
    <textarea name="statement" id="statement" rows="5" required></textarea>
    <button type="submit">Submit appeal</button>
  </form>
{% endblock %}
