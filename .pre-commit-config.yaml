repos:
  - repo: local
    hooks:
      - id: secret-push-guard
        name: Block env files, keys, and risky deploy config
        entry: bash scripts/check-secrets-before-push.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    # Pin v8.18.4: v8.22+ panics on Windows (wasilibs/go-re2 wasm).
    rev: v8.18.4
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^prosocial_platform/
      - id: ruff-format
        files: ^prosocial_platform/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
